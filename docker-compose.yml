services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=test
      # Datanode will connect to the namenode using this address
      # Sets hadoop config as: fs.defaultFS = hdfs://namenode:9000
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    # Expose the namenode web UI port
    ports:
      - "9870:9870"
    # Attach a volume to the datanode to persist data
    volumes:
      - namenode:/hadoop/dfs/name
  
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    environment:
      - CLUSTER_NAME=test
      - NAMENODE_HOST=namenode
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    # Attach a volume to the datanode to persist data
    volumes:
      - datanode1:/hadoop/dfs/data

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    environment:
      - CLUSTER_NAME=test
      - NAMENODE_HOST=namenode
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    # Attach a volume to the datanode to persist data
    volumes:
      - datanode2:/hadoop/dfs/data

  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode3
    environment:
      - CLUSTER_NAME=test
      - NAMENODE_HOST=namenode
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    # Attach a volume to the datanode to persist data
    volumes:
      - datanode3:/hadoop/dfs/data

# Declare the volumes for namenode and datanode
volumes:
  namenode:
  datanode1:
  datanode2:
  datanode3: